<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 800" width="420" height="800">
  <style>
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 2px #d97757); opacity: 0.85; }
      50% { filter: drop-shadow(0 0 12px #d97757) drop-shadow(0 0 25px rgba(217,119,87,0.35)); opacity: 1; }
    }
    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }
    .art {
      font-family: "Courier New", Courier, monospace;
      font-size: 10px;
      fill: #d97757;
      animation: glow 3s ease-in-out infinite;
    }
    .bg { fill: #2b2a27; }
    .scanline {
      fill: rgba(217,119,87,0.03);
      animation: scanline 4s linear infinite;
    }
    .dim { fill: #7a776e; font-family: "Courier New", Courier, monospace; font-size: 10px; }
    .tag { fill: #b0aea5; font-family: "Courier New", Courier, monospace; font-size: 10px; }
  </style>

  <rect class="bg" width="420" height="800" rx="8" />

  <clipPath id="clip">
    <rect width="420" height="800" rx="8" />
  </clipPath>
  <rect class="scanline" width="420" height="60" clip-path="url(#clip)" />

